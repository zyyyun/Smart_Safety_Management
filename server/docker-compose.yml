version: '3.8'

services:
  # 1. PostgreSQL 데이터베이스 설정
  db:
    platform: linux/amd64  # 추가
    image: postgis/postgis:15-3.3
    container_name: smart_safety_db
    restart: always
    environment:
      POSTGRES_USER: safety_user      # DB 접속 아이디
      POSTGRES_PASSWORD: password123  # DB 접속 비밀번호
      POSTGRES_DB: safety_management   # 생성할 DB 이름
    ports:
      - "5432:5432"                   # 로컬 포트 : 컨테이너 포트
    volumes:
      - ./postgres_data:/var/lib/postgresql/data # 데이터 유지 (컨테이너 삭제돼도 데이터 보존)
      - ../db.sql:/docker-entrypoint-initdb.d/init.sql # 초기화 SQL 스크립트 마운트

  # 2. Redis 설정 (인증번호, 세션 등 임시 데이터 저장용)
  redis:
    image: redis:latest
    container_name: smart_safety_redis
    restart: always
    ports:
      - "6379:6379"                   # Redis 기본 포트

  # 3. Redis Commander (Redis 웹 관리 도구 - pgAdmin과 같은 역할)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: smart_safety_redis_commander
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379  # 연결할 Redis 호스트 설정
    ports:
      - "8082:8081"                   # 브라우저에서 8082로 접속
    depends_on:
      - redis                         # Redis가 먼저 실행된 후 실행

  # 4. pgAdmin 4 설정 (웹 기반 DB 관리 도구)
  pgadmin:
    platform: linux/amd64 
    image: dpage/pgadmin4
    container_name: smart_safety_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com # pgAdmin 로그인 이메일
      PGADMIN_DEFAULT_PASSWORD: admin        # pgAdmin 로그인 비밀번호
    ports:
      - "8081:80"                            # 브라우저에서 8081으로 접속
    depends_on:
      - db                                   # DB가 먼저 실행된 후 실행
